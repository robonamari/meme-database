<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
  <meta charset="UTF-8">
  <title>404 | Meme Database</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#2f3242">
  <meta property="og:title" content="404 | Meme Database">
  <meta property="og:description"
    content="Page not found. The page you are looking for might have been moved or deleted.">
  <meta property="og:image" content="https://meme-database.robonamari.com/favicon.ico">
  <meta property="og:site_name" content="Meme Database">
  <link rel="icon" href="https://meme-database.robonamari.com/favicon.ico" type="image/x-icon">
  <style>
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: Shabnam;
      background-color: #2f3242;
      color: #fff;
      margin: 0;
      text-align: center
    }

    main {
      position: relative;
      min-height: 100vh
    }

    svg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 380px;
      height: auto
    }

    .message-box {
      width: 380px;
      height: 200px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-weight: 300
    }

    .message-box h1 {
      font-size: 60px;
      line-height: 46px;
      margin-bottom: 20px
    }

    .message-box p {
      font-size: 18px;
      margin-bottom: 30px
    }

    .buttons-con .action-link-wrap {
      margin-top: 20px
    }

    .buttons-con .action-link-wrap a {
      background: #68c950;
      padding: 8px 25px;
      border-radius: 4px;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.3s linear;
      cursor: pointer;
      margin-right: 10px
    }

    .buttons-con .action-link-wrap a:hover {
      background: #5a5c6c;
      color: #fff
    }

    #Polygon-1,
    #Polygon-2,
    #Polygon-3,
    #Polygon-4,
    #Polygon-5 {
      animation: float 1s infinite ease-in-out alternate
    }

    #Polygon-2 {
      animation-delay: 0.2s
    }

    #Polygon-3 {
      animation-delay: 0.4s
    }

    #Polygon-4 {
      animation-delay: 0.6s
    }

    #Polygon-5 {
      animation-delay: 0.8s
    }

    @keyframes float {
      100% {
        transform: translateY(20px)
      }
    }

    @media(max-width: 450px) {
      svg {
        width: 300px
      }

      .message-box {
        width: 280px
      }

      .message-box h1 {
        font-size: 40px
      }

      .buttons-con .action-link-wrap a {
        padding: 8px 18px;
        font-size: 12px
      }
    }
  </style>
</head>

<body>
  <main>
    <svg version="1.1" viewBox="0 0 837 1045" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" fill-rule="evenodd" stroke-width="1">
        <path d="M353,9 L626.664028,170 L626.664028,487 L353,642 L79.3359724,487 L79.3359724,170 L353,9 Z"
          id="Polygon-1" stroke="#007FB2" stroke-width="6"></path>
        <path d="M78.5,529 L147,569.186414 L147,648.311216 L78.5,687 L10,648.311216 L10,569.186414 L78.5,529 Z"
          id="Polygon-2" stroke="#EF4A5B" stroke-width="6"></path>
        <path d="M773,186 L827,217.538705 L827,279.636651 L773,310 L719,279.636651 L719,217.538705 L773,186 Z"
          id="Polygon-3" stroke="#795D9C" stroke-width="6"></path>
        <path d="M639,529 L773,607.846761 L773,763.091627 L639,839 L505,763.091627 L505,607.846761 L639,529 Z"
          id="Polygon-4" stroke="#F2773F" stroke-width="6"></path>
        <path d="M281,801 L383,861.025276 L383,979.21169 L281,1037 L179,979.21169 L179,861.025276 L281,801 Z"
          id="Polygon-5" stroke="#36B455" stroke-width="6"></path>
      </g>
    </svg>
    <div class="message-box">
      <h1>404</h1>
      <p>Page not found</p>
      <div class="buttons-con">
        <div class="action-link-wrap">
          <a class="link-back-button" onclick="history.back()">Go Back</a>
          <a class="link-home-button" href="#" onclick="goToPreviousRoot()">Go to Home Page</a>
        </div>
      </div>
    </div>
  </main>
  <script defer>
    function goToPreviousRoot() {
      try {
        const ref = document.referrer
        location.href = ref ? new URL(ref).origin : ''
        if (!ref) history.back()
      } catch {
        history.back()
      }
    }
  </script>
</body>

</html>
